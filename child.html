<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Child Selector Example</title>
  <style>
    .content > h2 {
      color: darkgreen;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="content">
    <h2>Main Heading (Direct Child)</h2>
    <div>
      <h2>Nested Heading (Not Direct Child)</h2>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Contact Card</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
    }

    /* Fixed header bar */
    


header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background-color: #333; 
  color: white;          
  text-align: center;     
  padding: 15px;
  font-size: 20px;
}


    

    .profile {
      margin-top: 70px; 
      position: relative;
      background-color: #fff;
      border: 1px solid #ccc;
      width: 70%;
      margin-left: auto;
      margin-right: auto;
      padding: 20px;
      overflow: auto; 
      min-height: 250px;
      box-sizing: border-box;
      background-color: rgb(61, 174, 212);
    }

    
    .profile img {
      float: left;
      width: 150px;
      height: 150px;
      margin-right: 20px;
      border-radius: 8px;
    }

    
    .employee {
      text-align: center;
    }

    .employee h2 {
      margin: 0;
      color: #333;
    }

    .employee h3 {
      margin: 5px 0;
      color: #555;
    }

    .employee p {
      margin-top: 10px;
      color: #666;
    }

    
    .contact {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 200px;
      background-color: #7cbaf0;
      border-left: 2px solid #333; /* vertical line separator */
      text-align: center;
      padding: 15px;
      box-sizing: border-box;
    }

    .contact h3 {
      margin-top: 0;
      color: #333;
    }

    .contact p {
      margin: 5px 0;
      color: #555;
    }

    .clear {
      clear: both;
    }
  </style>
</head>
<body>

  <body>
    <header> COMPANY CONTACT CARD</header>
    <div class="profile">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR7Afa1T5T8Wfnu3hKYy7CBHMFj5JdR8To80u3oBkNcbHB_tHrfNKkOqtzs&s=10" width="100" height="100">
        <div class="employee">
            <h2> Sreya Mohan</h2>
            <h3> Marketing Manager</h3>
            <p>Sreya has over 8 years of experience in digital marketing and brand strategy. She specializes in creating impactful campaigns that boost customer engagement and drive growth.  </p>
            </div>
            <div class="contact">
                <p> tel:+91 9812705473</p>
                <p> Email:sreya12@gmail.com</p>
            </div>
            <div class="clear"></div>
            </div>

</body>
</html>

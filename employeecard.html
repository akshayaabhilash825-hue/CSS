<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .header{
        position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background-color: #333; 
  color: white;           
  text-align: center;     
  padding: 15px;
  font-size: 20px;
        }
        .profile{
            margin:0px;
            background-color: antiquewhite;
            position: relative;
            border:2px;
            width: 100%;
            box-sizing: border-box;
            overflow:auto;
            min-height: 250px;

        }
        .employee{
            text-align: center;
     
        }
        .employee h3{
            text-align: center;
                   margin: 0px;
       
        }
        .employee h4{
            text-align: center;
                 margin:0.5px;
        }
        .contact {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 200px;
      background-color: #f0f8ff;
      border-left: 2px solid #333; /* vertical line separator */
      text-align: center;
      padding: 15px;
      box-sizing: border-box;
    }

    .contact h3 {
      margin-top: 0;
      color: #333;
    }

    .contact p {
      margin: 5px 0;
      color: #555;
    }

    .clear {
      clear: both;
    }


    </style>
</head>
<body>
    <header> COMPANY CONTACT CARD</header>
    <div class="profile">
        <img src="">
        <div class="employee">
            <h3> Sreya Mohan</h3>
            <h4> Marketing Manager</h4>
            <p>Sreya has over 8 years of experience in digital marketing and brand strategy. She specializes in creating impactful campaigns that boost customer engagement and drive growth.  </p>
            </div>
            <div class="contact">
                <p> tel:+91 9812705473</p>
                <p> Email:sreya12@gmail.com</p>
            </div>
            <div class="clear"></div>
            </div>
</body>
</html>

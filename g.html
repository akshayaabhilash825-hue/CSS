<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu</title>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="<i class="bi bi-fork-knife"></i>">

    <style>
        /* Restaurant Name */
        h3 {
            text-align: right;
            font-family: 'Georgia', serif;
            font-size: 28px;
            color: #C0392B; /* Burgundy Red */
        }

        /* Welcome Message */
        .welcome {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            word-spacing: 10px;
            font-size: 18px;
            color: #2C3E50;
        }

        /* Table Styling */
        table {
            border: 2px solid #2C3E50;
            border-collapse: collapse;
            width: 60%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid #2C3E50;
            text-align: center;
            vertical-align: middle;
            padding: 10px;
        }

        /* Links Styling */
        a {
            text-decoration: none;
            color: #2980B9;
        }
        a:hover {
            color: #E74C3C;
        }
    </style>
</head>
<body>

    <!-- Restaurant Name with Icon -->
    <h3><i class="fa-solid fa-utensils"></i> Gourmet Delight</h3>

    <!-- Welcome Message -->
    <p class="welcome">Welcome to our restaurant</p>

    <!-- Menu Table with Icon -->
    <table>
        <tr>
            <th><i class="fa-solid fa-burger"></i> Item</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>Grilled Chicken</td>
            <td>$12.99</td>
        </tr>
        <tr>
            <td>Veggie Pasta</td>
            <td>$9.99</td>
        </tr>
        <tr>
            <td>Cheese Pizza</td>
            <td>$11.50</td>
        </tr>
    </table>

    <!-- Example Link -->
    <p style="text-align:center;">
        <a href="#">View Full Menu</a>
    </p>

</body>
</html>
